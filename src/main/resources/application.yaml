server:
  port: 8090

spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: ${auth-server.url}/realms/${auth-server.realm}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            provider: keycloak
            client-id: ${auth-server.client-id}
            client-secret: ${auth-server.client-secret}
            authorization-grant-type: authorization_code
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  cloud:
    gateway:
      server:
        webflux:
          # TokenRelay is intentionally a default-filter (applied to every route): this is the
          # core of the BFF pattern. Spring Security stores the OAuth2 access_token in the
          # server-side session and TokenRelay copies it onto the proxied request as
          # `Authorization: Bearer <token>` so downstream services (registry, auth) see an
          # authenticated request without the SPA ever handling the token directly.
          default-filters:
            - TokenRelay
          routes:
            - id: components-registry-api
              uri: ${COMPONENTS_REGISTRY_SERVICE_URL:http://localhost:4567}
              predicates:
                - Path=/rest/**
            - id: components-registry-auth
              uri: ${COMPONENTS_REGISTRY_SERVICE_URL:http://localhost:4567}
              predicates:
                - Path=/auth/**

# auth-server.* bind from AUTH_SERVER_URL, AUTH_SERVER_REALM, AUTH_SERVER_CLIENT_ID,
# AUTH_SERVER_CLIENT_SECRET env vars via Spring Boot's relaxed binding. All four are
# required at startup: with any missing, spring-boot-starter-oauth2-client will fail
# OIDC issuer discovery and the app will refuse to boot (intentional fail-fast).
auth-server:
  url:
  realm:
  client-id:
  client-secret:

# Link base URLs are runtime-config (not baked into the Vite bundle) so that
# a single build can be deployed to multiple environments (prod, QA, staging)
# with different external tool URLs. Unset vars produce empty strings, which
# the controller collapses to null in the JSON response.
portal:
  # Base URL of the components-registry instance this portal proxies. The same
  # env var feeds the gateway routes above; the health indicator reuses it to
  # mirror the registry's anonymous `employeeService` health component.
  registry-health-base-url: ${COMPONENTS_REGISTRY_SERVICE_URL:http://localhost:4567}
  # Environment label shown as a header badge in the SPA (e.g. "TEST" on QA),
  # so a test instance can't be mistaken for production. Unset/blank → the
  # field is omitted from /portal/info and no badge is rendered (prod default).
  # Per environment, prefer setting `portal.environment-label` in service-config
  # (config-server property sources override this default); the env var is the
  # fallback for local/dev/docker runs. Startup-bound (@Value) — a service-config
  # change needs a portal restart to take effect.
  environment-label: ${PORTAL_ENVIRONMENT_LABEL:}
  links:
    jira-base-url: ${PORTAL_LINKS_JIRA_BASE_URL:}
    git-base-url: ${PORTAL_LINKS_GIT_BASE_URL:}
    tc-base-url: ${PORTAL_LINKS_TC_BASE_URL:}
    dms-base-url: ${PORTAL_LINKS_DMS_BASE_URL:}
  # Generic "Validation Problems" facility: a scheduled in-memory sweep that
  # reconciles release-management's RELEASE builds against the components-registry
  # resolver. registry-base-url reuses the same CRS env var as the gateway routes;
  # release-management-base-url is new. All timeout budgets are env-tunable so
  # QA/prod can adjust without a rebuild.
  #
  # IMPORTANT: registry-base-url and release-management-base-url MUST be https.
  # Over http these services issue an http->https redirect; WebClient follows it
  # but downgrades the detailed-versions POST to a GET on the redirect, which CRS
  # rejects as HTTP 405. Use https base URLs so the POST is preserved (200).
  validation:
    registry-base-url: ${COMPONENTS_REGISTRY_SERVICE_URL:http://localhost:4567}
    release-management-base-url: ${RELEASE_MANAGEMENT_SERVICE_URL:http://localhost:4568}
    refresh-interval-ms: ${PORTAL_VALIDATION_REFRESH_INTERVAL_MS:14400000}
    # Failure-backoff cadence: after a FAILED whole-sweep (timeout/unreachable) the next
    # sweep is scheduled after this short interval instead of refresh-interval-ms, so a
    # transient downstream outage (e.g. a CRS redeploy running its multi-minute DSL→DB
    # migration, which starves requests and trips the sweep timeout) self-heals within
    # minutes rather than leaving a stale report until the next full interval. Default 10m.
    retry-interval-ms: ${PORTAL_VALIDATION_RETRY_INTERVAL_MS:600000}
    # Per-component fan-out cap. Kept modest so the sweep does not overload a single
    # components-registry instance (no CRS replicas in test) — the sweep is the only
    # bulk load on it. Env-tunable per environment.
    concurrency: ${PORTAL_VALIDATION_CONCURRENCY:4}
    request-timeout-seconds: ${PORTAL_VALIDATION_REQUEST_TIMEOUT_SECONDS:30}
    sweep-timeout-seconds: ${PORTAL_VALIDATION_SWEEP_TIMEOUT_SECONDS:600}
    live-timeout-seconds: ${PORTAL_VALIDATION_LIVE_TIMEOUT_SECONDS:60}
    # Max in-memory buffer per downstream response body. The CRS /rest/api/3/components
    # list is ~1.3 MB and grows; WebClient's default 256 KB limit overflows it
    # (DataBufferLimitException). 16 MiB (16777216) gives generous headroom.
    max-response-bytes: ${PORTAL_VALIDATION_MAX_RESPONSE_BYTES:16777216}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  server:
    port: 8080
