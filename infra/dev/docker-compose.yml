# Local dev stack: Postgres + Keycloak + CRS.
# Portal runs separately via ./gradlew bootRun (see instructions below).
# Frontend hot-reload via cd frontend && npm run dev.
#
# One-time host setup required:
#   echo "127.0.0.1 keycloak" | sudo tee -a /etc/hosts
#   cp infra/dev/.env.example infra/dev/.env  # edit secrets if you don't want defaults
#
# Start stack (use the wrapper — it envsubst's the realm JSON before bringing
# up the containers, matching the runtime-substitution pattern that
# E2ETestcontainersDriver.kt uses for E2E):
#   cd infra/dev && ./up.sh up -d
#
# Run portal (in a separate terminal):
#   set -a; source infra/dev/.env; set +a
#   SPRING_PROFILES_ACTIVE=dev \
#   AUTH_SERVER_URL=http://keycloak:8080 \
#   AUTH_SERVER_REALM=portal \
#   AUTH_SERVER_CLIENT_ID=portal-bff \
#   AUTH_SERVER_CLIENT_SECRET="$PORTAL_BFF_SECRET" \
#   COMPONENTS_REGISTRY_SERVICE_URL=http://localhost:4567 \
#   ./gradlew bootRun
#
# Run frontend (in a separate terminal):
#   cd frontend && npm run dev
#
# Open: http://localhost:5173
# Login: e2e-admin / $E2E_ADMIN_PASSWORD  (roles: ADMIN)
#        e2e-viewer / $E2E_VIEWER_PASSWORD (roles: COMPONENTS_REGISTRY_VIEWER)
#
# -----------------------------------------------------------------------------
# Gotchas (from real-world local smoke runs):
#
# 1. `up.sh` invokes `docker compose` (the plugin). On hosts that only have
#    legacy `docker-compose` (Docker Desktop pre-plugin, brewed installs), it
#    fails with "unknown shorthand flag: 'd'". Workaround: run the realm-
#    envsubst step manually (lines 41-48 of up.sh) then `docker-compose up -d`.
#
# 2. The Keycloak 24.0.3 image does NOT ship `curl`, so the dockerised
#    healthcheck below always reports `(unhealthy)` even when the realm
#    endpoint is reachable. As a result `docker-compose up -d` (which honours
#    `depends_on: service_healthy`) hangs starting `crs`. Two ways out:
#      a) Bring up CRS without the depends-on check:
#           docker-compose up -d postgres keycloak
#           # wait until `curl http://localhost:8080/realms/portal/.well-known/openid-configuration`
#           # returns 200 (~70-100s; first cold start imports the realm)
#           docker-compose up -d --no-deps crs
#      b) Or replace the healthcheck with a TCP probe (separate cleanup PR).
#
# 3. Worktree workflows (`git worktree add ...`): `.env` is gitignored and
#    does NOT propagate to a freshly-created worktree. Copy it explicitly:
#      cp ../../infra/dev/.env _wt/<name>/infra/dev/.env
#
# 4. When CRS migrations change (any edit under
#    `components-registry-service-server/src/main/resources/db/migration/`),
#    Flyway will refuse to start against a Postgres volume that already
#    applied the previous version: "Either revert the changes to the
#    migration, or run repair". CRS is pre-prod (see
#    `~/.claude/projects/.../memory/project_db_fresh_on_deploy.md`), so the
#    correct response is to nuke the local volume:
#      docker-compose down -v && docker-compose up -d postgres keycloak
#
# 5. The Spring Cloud Config bootstrap fails on a host run (no config server
#    on :8888). The CRS container disables it via env in this compose; the
#    portal BFF needs the same env when launched locally:
#      SPRING_CLOUD_CONFIG_ENABLED=false \
#      SPRING_CLOUD_BOOTSTRAP_ENABLED=false \
#      SPRING_CONFIG_IMPORT="" \
#      EUREKA_CLIENT_ENABLED=false \
#      ./gradlew bootRun
#
# 6. Smoke quick-check (after the stack is up, BFF on :8090, Vite on :5173):
#    open http://localhost:5173 → login as e2e-admin → /components → click
#    "+ New Component". Expected:
#      * No Product Type field.
#      * Group ID auto-fills with `<supportedGroupIds[0]>.<lowercased name>`
#        after typing into Component Key (e.g. `my-svc` →
#        `<prefix>.my.svc`).
#      * Entering an unsupported groupId surfaces a red inline error and
#        disables Create.
#      * Build System is required (* marker); Explicit unchecked + External
#        checked by default.
#    The footer in the lower-right shows the CRS service version actually
#    serving requests — verify it matches the image tag in .env, not a
#    stale cached image.

services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    environment:
      POSTGRES_DB: components_registry
      POSTGRES_USER: crs
      POSTGRES_PASSWORD: crs
    ports:
      - "5434:5432"
    volumes:
      - crs-pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    platform: linux/amd64
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/portal/.well-known/openid-configuration || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY: edge
    ports:
      - "8080:8080"
    volumes:
      # Mount the envsubst-rendered realm produced by up.sh, NOT the
      # placeholder source. up.sh writes the rendered file to keycloak/.local/
      # which is gitignored, so committed history never carries plaintext
      # secrets.
      - ./keycloak/.local/portal-realm.json:/opt/keycloak/data/import/portal-realm.json:ro
    command: start-dev --import-realm

  crs:
    # Set CRS_DOCKER_REGISTRY to your internal registry (e.g. via .env file or shell export).
    image: ${CRS_DOCKER_REGISTRY}/octopusden/components-registry-service:${CRS_VERSION:-2.0.84-3543}
    platform: linux/amd64
    depends_on:
      postgres:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev-db-automigrate
      SPRING_CLOUD_CONFIG_ENABLED: "false"
      SPRING_CLOUD_BOOTSTRAP_ENABLED: "false"
      SPRING_CONFIG_IMPORT: ""
      EUREKA_CLIENT_ENABLED: "false"
      SERVER_PORT: "4567"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: components_registry
      POSTGRES_USER: crs
      POSTGRES_PASSWORD: crs
      AUTH_SERVER_URL: http://keycloak:8080
      AUTH_SERVER_REALM: portal
      COMPONENTS_REGISTRY_WORK_DIR: /opt/crs-fixture
      COMPONENTS_REGISTRY_GROOVY_PATH: /opt/crs-fixture
      COMPONENTS_REGISTRY_MAIN_GROOVY_FILE: Aggregator.groovy
      COMPONENTS_REGISTRY_DEPENDENCY_MAPPING_FILE: dependency_mapping.properties
      COMPONENTS_REGISTRY_COPYRIGHT_PATH: /opt/crs-fixture/copyrights
      COMPONENTS_REGISTRY_SUPPORTEDGROUPIDS: "org.octopusden.octopus,io.bcomponent"
      COMPONENTS_REGISTRY_SUPPORTEDSYSTEMS: "NONE,CLASSIC,ALFA"
      COMPONENTS_REGISTRY_VERSION_NAME_SERVICE_BRANCH: serviceCBranch
      COMPONENTS_REGISTRY_VERSION_NAME_SERVICE: serviceC
      COMPONENTS_REGISTRY_VERSION_NAME_MINOR: minorC
      COMPONENTS_REGISTRY_PRODUCT_TYPE_C: PT_C
      COMPONENTS_REGISTRY_PRODUCT_TYPE_K: PT_K
      COMPONENTS_REGISTRY_PRODUCT_TYPE_D: PT_D
      COMPONENTS_REGISTRY_PRODUCT_TYPE_DDB: PT_D_DB
      COMPONENTS_REGISTRY_VCS_ENABLED: "false"
      COMPONENTS_REGISTRY_AUTO_MIGRATE: "true"
    ports:
      - "4567:4567"
    volumes:
      - ../../src/test/resources/e2e/crs-fixture:/opt/crs-fixture:ro

volumes:
  crs-pgdata:
