document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

zspin .7s linear infinite; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"wiz\" data-theme=\"{{ theme }}\" style=\"min-height:100vh;background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:14px;display:flex;flex-direction:column;\">\n\n  <!-- ================= EDITOR MAPPING-CARD (#10) ================= -->\n  <sc-if value=\"{{ editorView }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:820px;margin:0 auto;width:100%;padding:28px 24px;display:flex;flex-direction:column;gap:16px;\">\n      <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted-fg);\">\n        <span>Editor<\u002Fspan><span>›<\u002Fspan><span style=\"font-weight:600;color:var(--fg);\">General &amp; Build<\u002Fspan>\n        <span style=\"margin-left:8px;font-size:11px;background:var(--bg-blue);color:var(--fg-blue);border-radius:9999px;padding:2px 9px;font-weight:600;\">alignment preview<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:var(--muted-fg);margin:0;\">Editor keeps raw External / Explicit toggles (no profile). Produced Artifacts uses the same per-groupId control and terminology as the wizard. One base mapping — version-range overrides and legacy preview are out of scope here.<\u002Fp>\n      <div style=\"border:1px solid var(--border);border-radius:12px;background:var(--card);padding:18px;display:flex;flex-direction:column;gap:12px;\">\n        <h3 style=\"font-size:15px;font-weight:600;margin:0;\">Classification <span style=\"font-size:11px;font-weight:500;color:var(--muted-fg);\">· General tab<\u002Fspan><\u002Fh3>\n        <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;\">\n          <input type=\"checkbox\" checked=\"{{ editorExternal }}\" onchange=\"{{ onEditorExternal }}\" style=\"height:16px;width:16px;accent-color:var(--primary);\">\n          <span style=\"font-size:13.5px;font-weight:500;\">External ter;gap:6px;\">\n                <label style=\"font-size:13px;font-weight:500;\">Build System <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                <span class=\"fi\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4\"><\u002Fpath><path d=\"M12 8h.01\"><\u002Fpath><\u002Fsvg><span class=\"tip\">VCS fields are not required for these build systems; the VCS step shows a note instead.<\u002Fspan><\u002Fspan>\n              <\u002Fdiv>\n              <select class=\"ctrl\" value=\"{{ v.buildSystem }}\" onchange=\"{{ set.buildSystem }}\" style=\"width:100%;height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:14px;\">\n                <option value=\"\">Select build system<\u002Foption>\n                <sc-for list=\"{{ buildSystems }}\" as=\"bs\" hint-placeholder-count=\"4\"><option value=\"{{ bs.value }}\">{{ bs.label }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n              <sc-if value=\"{{ e.buildSystem }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">{{ e.buildSystem }}<\u002Fp><\u002Fsc-if>\n              <sc-if value=\"{{ vcsHiddenNote }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--muted-fg);margin:0;\">No VCS root required for this build system — the VCS step's fields will be optional.<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- Produced Artifacts (moved from General per brief C7) -->\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-fg);border-bottom:1px solid var(--border);padding-bottom:6px;\">Produced Artifacts<\u002Fdiv>\n              <p style=\"font-size:12.5px;color:var(--muted-fg);margin:-4px 0 0;\">The artifacts this component produces — it is resolved by these coordinates. Each Group ID has its own matching mode.<\u002Fp>\n              <sc-for list=\"{{ artifactRows }}\" as=\"a\" hint-placeholder-count=\"1\">\n                <div style=\"border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;\">\n                    <span style=\"font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-fg);\">Group mapping<\u002Fspan>\n                    <sc-if value=\"{{ a.canRemove }}\" hint-placeholder-val=\"{{ false }}\"><button type=\"button\" onclick=\"{{ a.onRemove }}\" class=\"btn ghost\" style=\"height:26px;padding:0 8px;font-size:12px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--muted-fg);cursor:pointer;\">Remove<\u002Fbutton><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:3px;\">\n                    <label style=\"font-size:12.5px;font-weight:500;\">Group ID<\u002Flabel>\n                    <div style=\"display:flex;gap:8px;align-items:center;\">\n                      <input class=\"ctrl\" value=\"{{ a.groupId }}\" oninput=\"{{ a.onGroup }}\" placeholder=\"com.example.foo\" style=\"flex:1;height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace;\">\n                      <span style=\"width:16px;display:flex;justify-content:center;\">\n                        <sc-if value=\"{{ a.checking }}\" hint-placeholder-val=\"{{ false }}\"><svg class=\"spin\" width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted-fg)\" stroke-width=\"2.4\" stroke-linecap=\"round\"><path d=\"M21 12a9 9 0 1 1-6.219-8.56\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                        <sc-if value=\"{{ a.ok }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--fg-green)\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                        <sc-if value=\"{{ a.conflict }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--destructive)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4\"><\u002Fpath><path d=\"M12 16h.01\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                      <\u002Fspan>\n                    <\u002Fdiv>\n                    <sc-if value=\"{{ a.conflict }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">Already produced by <a href=\"#\" style=\"color:var(--destructive);font-weight:600;text-decoration:underline;\">{{ a.owner }}<\u002Fa> — choose a different Group ID.<\u002Fp><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:3px;\">\n                    <label style=\"font-size:12.5px;font-weight:500;\">artifactId matching mode<\u002Flabel>\n                    <select class=\"ctrl\" value=\"{{ a.mode }}\" onchange=\"{{ a.onMode }}\" style=\"height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:13px;\">\n                      <sc-for list=\"{{ modeOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o.value }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n                    <\u002Fselect>\n                    <sc-if value=\"{{ a.modeHelp }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--muted-fg);margin:0;\">{{ a.modeHelp }}<\u002Fp><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ a.explicit }}\" hint-placeholder-val=\"{{ false }}\">\n                    <div style=\"display:flex;flex-direction:column;gap:3px;\">\n                      <label style=\"font-size:12.5px;font-weight:500;\">Specific artifacts <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                      <input class=\"ctrl\" value=\"{{ a.tokens }}\" oninput=\"{{ a.onTokens }}\" placeholder=\"artifact-a, artifact-b\" style=\"height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace;\">\n                      <p style=\"font-size:12px;color:var(--muted-fg);margin:0;\">Each (Group ID, artifact) pair is checked against other components.<\u002Fp>\n                      <sc-if value=\"{{ a.pairConflict }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">Pair <span style=\"font-family:ui-monospace,Menlo,Consolas,monospace;\">{{ a.pair }}<\u002Fspan> already produced by <a href=\"#\" style=\"color:var(--destructive);font-weight:600;text-decoration:underline;\">{{ a.pairOwner }}<\u002Fa>.<\u002Fp><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <button type=\"button\" onclick=\"{{ addArtifact }}\" disabled=\"{{ addArtifactDisabled }}\" class=\"btn ghost\" style=\"align-self:flex-start;display:inline-flex;align-items:center;gap:6px;height:32px;border-radius:6px;padding:0 10px;font-size:12.5px;font-weight:500;background:transparent;border:1px dashed var(--border);color:var(--fg);cursor:pointer;\">\n                <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5v14\"><\u002Fpath><\u002Fsvg>Add one more groupId\n              <\u002Fbutton>\n              <sc-if value=\"{{ addArtifactHint }}\" hint-placeholder-val=\"{{ true }}\"><p style=\"font-size:12px;color:var(--muted-fg);margin:0;\">Fill in the current Group ID (and its artifacts, for “Specific artifacts only”) before adding another.<\u002Fp><\u002Fsc-if>\n              <sc-if value=\"{{ artifactMultiError }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">{{ artifactMultiError }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== STEP: VCS ===== -->\n          <sc-if value=\"{{ showVcsBody }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <div><h2 style=\"font-size:17px;font-weight:600;margin:0;\">VCS<\u002Fh2><p style=\"font-size:13px;color:var(--muted-fg);margin:3px 0 0;\">Version control root for the component's source.<\u002Fp><\u002Fdiv>\n            <sc-if value=\"{{ vcsNa }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:13px;color:var(--muted-fg);margin:0;border:1px dashed var(--border);border-radius:8px;padding:12px 14px;\">No VCS root is required for the selected build system. This step stays for consistency — nothing to fill in here.<\u002Fp><\u002Fsc-if>\n            <sc-if value=\"{{ vcsApplies }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <div style=\"display:flex;flex-direction:column;gap:6px;\">\n              <div style=\"display:flex;align-items:center;gap:6px;\">\n                <label style=\"font-size:13px;font-weight:500;\">VCS Path <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                <span class=\"fi\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 16v-4\"><\u002Fpath><path d=\"M12 8h.01\"><\u002Fpath><\u002Fsvg><span class=\"tip\">ssh:// path on the ecosystem Bitbucket host. Unique per component.<\u002Fspan><\u002Fspan>\n                <sc-if value=\"{{ reenterVcs }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;font-size:11px;font-weight:600;color:var(--fg-yellow);background:var(--bg-yellow);border-radius:9999px;padding:1px 8px;\">re-enter<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <input class=\"ctrl\" value=\"{{ v.vcsUrl }}\" oninput=\"{{ set.vcsUrl }}\" placeholder=\"ssh://git@bitbucket.acme.io/PROJECT/repo.git\" style=\"{{ vcsUrlStyle }}\">\n              <sc-if value=\"{{ e.vcsUrl }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">{{ e.vcsUrl }}<\u002Fp><\u002Fsc-if>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <label style=\"font-size:13px;font-weight:500;\">Tag <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                <input class=\"ctrl\" value=\"{{ v.vcsTag }}\" oninput=\"{{ set.vcsTag }}\" style=\"width:100%;height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace;\">\n                <sc-if value=\"{{ e.vcsTag }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">{{ e.vcsTag }}<\u002Fp><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                <label style=\"font-size:13px;font-weight:500;\">Production branch <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                <input class=\"ctrl\" value=\"{{ v.vcsBranch }}\" oninput=\"{{ set.vcsBranch }}\" style=\"width:100%;height:36px;border:1px solid var(--input);background:var(--card);color:var(--fg);border-radius:6px;padding:0 10px;font-size:12.5px;font-family:ui-monospace,Menlo,Consolas,monospace;\">\n                <sc-if value=\"{{ e.vcsBranch }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:12px;color:var(--destructive);margin:0;\">{{ e.vcsBranch }}<\u002Fp><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- ===== STEP: JIRA ===== -->\n          <sc-if value=\"{{ showJira }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:20px;\">\n            <div><h2 style=\"font-size:17px;font-weight:600;margin:0;\">Jira<\u002Fh2><p style=\"font-size:13px;color:var(--muted-fg);margin:3px 0 0;\">Where releases and issues are tracked, and the version formats that render each version.<\u002Fp><\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px;\">\n              <div style=\"font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted-fg);border-bottom:1px solid var(--border);padding-bottom:6px;\">Jira project<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px;max-width:320px;\">\n                <div style=\"display:flex;align-items:center;gap:6px;\">\n                  <label style=\"font-size:13px;font-weight:500;\">Project Key <span style=\"color:var(--destructive);\">*<\u002Fspan><\u002Flabel>\n                  <sc-if value=\"{{ reenterJira }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:auto;font-size:11px;font-weight:600;color:var(--fg-yellow);background:var(--bg-yellow);border-radius:9999px;padding:1px 8px;\">re-enter<\u002Fspan><\u002Fsc-if>\n                <\u00
